<!DOCTYPE html>
<html>
<head>
  <title>Perfume Scraper</title>
  <style>
    body { font-family: Arial; text-align:center; padding:40px; }
    .bar { width:100%; background:#eee; height:25px; border-radius:10px; overflow:hidden; }
    .fill { height:100%; width:0%; background:green; transition:0.3s; }
    button { padding:10px 20px; margin-top:20px; }
  </style>
</head>

<body>

<h2>Perfume Scraper 🚀</h2>

<input type="file" id="file" />
<button onclick="upload()">Upload</button>

<div class="bar" style="margin-top:20px;">
  <div class="fill" id="fill"></div>
</div>

<p id="status">Waiting...</p>

<a id="download" style="display:none;" href="/download">Download Report</a>

<script>
const evt = new EventSource("/progress");

evt.onmessage = (e) => {
  const data = JSON.parse(e.data);
  document.getElementById("fill").style.width = data.progress + "%";
  document.getElementById("status").innerText = "Progress: " + data.progress + "%";
};

async function upload() {
  const file = document.getElementById("file").files[0];

  const form = new FormData();
  form.append("file", file);

  document.getElementById("status").innerText = "Uploading...";

  const res = await fetch("/upload", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  document.getElementById("status").innerText = "Done!";
  document.getElementById("download").style.display = "block";
}
</script>

</body>
</html>
