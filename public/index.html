<!DOCTYPE html>
<html>
<head>
  <title>Perfume Scraper</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:40px; }
    .box { max-width:600px; margin:auto; background:#222; padding:20px; border-radius:10px; }
    input, button { width:100%; padding:10px; margin-top:10px; }
    button { background:#00c853; border:none; color:white; }

    .bar { height:20px; background:#333; margin-top:20px; border-radius:10px; overflow:hidden; }
    .fill { height:100%; width:0%; background:lime; transition:0.3s; }
  </style>
</head>
<body>

<div class="box">
  <h2>Perfume Scraper</h2>

  <input type="file" id="file">
  <button onclick="upload()">Upload</button>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <div id="status">Waiting...</div>

  <a id="download" style="display:none" href="/download-report">Download Report</a>
</div>

<script>
const ws = new WebSocket("ws://localhost:3000");

ws.onmessage = (e) => {
  const d = JSON.parse(e.data);

  if (d.percent !== undefined) {
    document.getElementById("fill").style.width = d.percent + "%";
    document.getElementById("status").innerText =
      `Scraping ${d.current}/${d.total} (${d.percent}%)`;
  }

  if (d.done) {
    document.getElementById("status").innerText = "Done ✅";
    document.getElementById("download").style.display = "block";
  }
};

function upload() {
  const file = document.getElementById("file").files[0];

  const fd = new FormData();
  fd.append("file", file);

  fetch("/upload-csv-ui", {
    method: "POST",
    body: fd
  });
}
</script>

</body>
</html>
