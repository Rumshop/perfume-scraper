<!DOCTYPE html>
<html>
<head>
  <title>Perfume Scraper</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      cursor: pointer;
    }

    .bar {
      width: 100%;
      background: #334155;
      height: 20px;
      border-radius: 10px;
      margin-top: 15px;
    }

    .fill {
      height: 20px;
      width: 0%;
      background: limegreen;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Perfume Scraper</h2>

  <input type="file" id="file" />

  <button onclick="upload()">UPLOAD</button>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <p id="text">Waiting...</p>

  <a id="download" href="/download" style="display:none;color:cyan;">
    Download Report
  </a>
</div>

<script>
async function upload() {
  const file = document.getElementById("file").files[0];

  const form = new FormData();
  form.append("file", file);

  document.getElementById("text").innerText = "Uploading...";

  const res = await fetch("/upload", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("text").innerText = "Processing...";
    startProgress();
  }
}

async function startProgress() {
  const interval = setInterval(async () => {
    const res = await fetch("/progress");
    const data = await res.json();

    const percent = Math.round((data.done / data.total) * 100);

    document.getElementById("fill").style.width = percent + "%";
    document.getElementById("text").innerText =
      `Scraping ${data.done}/${data.total}`;

    if (!data.running) {
      clearInterval(interval);
      document.getElementById("text").innerText = "Done!";
      document.getElementById("download").style.display = "block";
    }
  }, 1000);
}
</script>

</body>
</html>
