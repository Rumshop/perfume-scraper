<!DOCTYPE html>
<html>
<head>
  <title>Perfume Scraper</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
      margin: auto;
    }

    input, button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
    }

    button {
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
    }

    .bar {
      width: 100%;
      background: #334155;
      border-radius: 10px;
      margin-top: 20px;
    }

    .fill {
      height: 20px;
      width: 0%;
      background: #22c55e;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Perfume Scraper</h2>

  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>

  <div class="bar">
    <div id="fill" class="fill"></div>
  </div>

  <p id="status">Waiting...</p>

  <a id="download" style="display:none" href="/download-report">Download Report</a>
</div>

<script>
const eventSource = new EventSource("/progress");

eventSource.onmessage = (e) => {
  const data = JSON.parse(e.data);

  if (data.done) {
    document.getElementById("status").innerText = "DONE ✅";
    document.getElementById("fill").style.width = "100%";
    document.getElementById("download").style.display = "block";
    return;
  }

  document.getElementById("fill").style.width = data.percent + "%";
  document.getElementById("status").innerText =
    `Processing ${data.current}/${data.total} (${data.percent}%)`;
};

async function upload() {
  const file = document.getElementById("file").files[0];

  const form = new FormData();
  form.append("file", file);

  document.getElementById("status").innerText = "Uploading...";

  await fetch("/upload-csv-ui", {
    method: "POST",
    body: form
  });
}
</script>

</body>
</html>
